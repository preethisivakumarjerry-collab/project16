<!DOCTYPE html>
<html lang="en">
<head>
  <title>Jumbotron</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

/* 🌈 Background Gradient*/
body{
    font-family:'Segoe UI';
    background:linear-gradient(-45deg,#4facfe,#00f2fe,rgb(56, 25, 25), #f9d423);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    transition:0.4s;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Toggle */
.toggle{
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 15px;
    border:none;
    border-radius:25px;
    background:black;
    color:white;
    box-shadow:0 0 10px black;
}

/* Jumbotron */
.jumbotron{
    border-radius:20px;
    margin-top:25px;
    padding:40px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.85);
    transition:0.4s;
    animation:fadeUp 1s ease;
}

/* Hover Glow */
.jumbotron:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* Animation */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* 🌈 Gradient Styles */
.jumbo-gradient{
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.jumbo-border{
    border:3px solid #031013;
}

/* Image */
.jumbo-img{
    background:url("https://images.unsplash.com/photo-1503264116251-35a269479413");
    background-size:cover;
    background-position:center;
    color:white;
}

/* Overlay */
.overlay{
    background:rgba(0,0,0,0.6);
    padding:40px;
    border-radius:20px;
}

/* Glass */
.jumbo-glass{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
}

/* Button */
.btn-anim{
    border-radius:25px;
    transition:0.3s;
}

.btn-anim:hover{
    transform:scale(1.1);
}

/* Dark Fix */
.dark .jumbotron{
    background:rgba(30,30,30,0.9);
}

</style>
</head>

<body>

<div class="container">

<!-- 1 Basic -->
<div class="jumbotron text-center">
  <h1>Basic Jumbotron</h1>
</div>

<!-- 2 Fluid -->
<div class="jumbotron jumbotron-fluid bg-info text-white text-center">
  <div class="container">
    <h1>Fluid</h1>
  </div>
</div>

<!-- 3 Gradient -->
<div class="jumbotron jumbo-gradient text-center">
  <h1>Gradient Style</h1>
</div>

<!-- 4 Image -->
<div class="jumbotron jumbo-img text-center">
  <div class="overlay">
    <h1>Image Background</h1>
  </div>
</div>

<!-- 5 Glass -->
<div class="jumbotron jumbo-glass text-center">
  <h1>Glass Effect</h1>
</div>

<!-- 6 Border -->
<div class="jumbotron jumbo-border text-center">
  <h1>Border Style</h1>
</div>

<!-- 7 Dark -->
<div class="jumbotron bg-dark text-white text-center">
  <h1>Dark Jumbotron</h1>
</div>

<!-- 8 Button -->
<div class="jumbotron text-center">
  <h1>Interactive</h1>
  <button class="btn btn-primary btn-anim">Click</button>
</div>

</div>

<script>
function toggleMode(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
